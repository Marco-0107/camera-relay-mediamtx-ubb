# Configuración base de MediaMTX.
# Las cámaras se agregan/quitan en caliente vía la Control API (puerto 9997),
# que MediaMTX persiste automáticamente en este mismo archivo.

logLevel: info

api: yes
apiAddress: :9997
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback

# RTSP: para reproducir en VLC/ffplay/OBS.
rtsp: yes
rtspTransports: [tcp]
rtspAddress: :8554

# WebRTC deshabilitado: el NAT universitario impide la negociación ICE
# cuando los puertos externos e internos difieren. Se usa HLS en su lugar.
webrtc: no

# HLS: el frontend consume los segmentos a través del proxy del backend
# (GET /hls/*), por lo que este puerto no necesita exponerse al exterior.
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# Sin paths predefinidos: se agregan dinámicamente desde el backend.
paths: {}
