# Configuración base de MediaMTX.
# Las cámaras se agregan/quitan en caliente vía la Control API (puerto 9997),
# que MediaMTX persiste automáticamente en este mismo archivo.

logLevel: info

# Control API: solo accesible dentro de la red interna de Docker (no se publica
# fuera del compose), por eso se permite sin credenciales aquí.
api: yes
apiAddress: :9997
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback

# RTSP: opcional, útil para depurar con ffplay/vlc desde la red interna.
rtsp: yes
protocols: [tcp]
rtspAddress: :8554

# WebRTC (WHEP): es lo que consume el frontend para la vista previa.
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ""
webrtcIPsFromInterfaces: yes
# Se sobreescribe en runtime por la variable de entorno MTX_WEBRTCADDITIONALHOSTS
# (definida en docker-compose.yml a partir de SERVER_HOST en el .env), para que el
# ICE negotiation funcione cuando los clientes se conectan desde otra máquina.
webrtcAdditionalHosts: []

# HLS deshabilitado: el preview usa WHEP exclusivamente.
hls: no

# Sin paths predefinidos: se agregan dinámicamente desde el backend.
paths: {}
